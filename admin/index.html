<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Woneng Admin</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">W</div>
    <h1>Admin Panel</h1>
    <p class="sub">Woneng Energy Management System</p>
    <div id="configWarn"></div>
    <form id="loginForm">
      <div class="field">
        <label>Email <span class="req">*</span></label>
        <input type="email" id="email" required placeholder="admin@example.com" autocomplete="username">
      </div>
      <div class="field">
        <label>Password <span class="req">*</span></label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-lg">Sign In</button>
    </form>
    <div class="login-foot"><a href="../index.html">← Back to website</a></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
(function () {
  // Redirect if already logged in
  AdminApp.getSession().then(function (s) { if (s) window.location.href = 'dashboard.html'; });

  // Config warning
  if (!AdminApp.isConfigured()) {
    document.getElementById('configWarn').innerHTML =
      '<div class="login-warn"><strong>⚠️ Setup needed:</strong> Edit <code>js/config.js</code> with your Supabase URL &amp; key, then run <code>database/schema.sql</code> in Supabase SQL Editor.</div>';
  }

  // Login submit
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    var btn = this.querySelector('button');
    btn.disabled = true; btn.textContent = 'Signing in…';
    var r = await AdminApp.login(document.getElementById('email').value, document.getElementById('password').value);
    if (r.error) { AdminApp.err(r.error); btn.disabled = false; btn.textContent = 'Sign In'; }
    else window.location.href = 'dashboard.html';
  });
})();
</script>
</body>
</html>
